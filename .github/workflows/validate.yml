name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          python -m json.tool launchpad/apps.example.json >/dev/null
      - name: Quick CSS check
        run: echo "CSS files present" && ls -l styles.css || true

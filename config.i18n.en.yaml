watch_stylesheet: true
watch_config: true
debug: false
komorebi:
  start_command: "komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic stop --whkd && komorebic start --whkd"
bars:
  primary-bar:
    enabled: true
    screens: ["G27QC"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: true
    animation:
      enabled: true
      duration: 1000
    blur_effect:
      enabled: false 
      acrylic: true 
      dark_mode: true
      round_corners: true
      border_color: None
    window_flags:
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 40
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left: [
        "home",
        "launchpad",
        # "komorebi_workspaces",
        "disk",
        "whkd",
        "komorebi_active_layout",
        "media",
        "pomodoro"
      ]
      center: [
        # "active_window",
        "notes",
        "taskbar",
        "todo"
      ]
      right: [
        # "ai_chat",
        "brightness",
        "bluetooth",
        "microphone",
        "cpu",
        "memory",
        "weather",
        # "language",
        # "wifi",
        # "power_menu",
        "volume",
        "clock"
      ]
widgets:
  notes:
   type: "yasb.notes.NotesWidget"
   options:
     label: "<span>\udb82\udd0c</span>{count}"
     label_alt: "<span>\udb82\udd0c</span> Notatki: {count}"
     container_padding:
       top: 0
       left: 0
       bottom: 0
       right: 0
     menu:
       blur: true
       round_corners: true
       round_corners_type: "normal"
       border_color: "System"
       alignment: "right"
       direction: "down"
       offset_top: 10
       offset_left: 0
       max_title_size: 150
       show_date_time: true
     icons:
       note: "\udb82\udd0c"
       delete: "\ueab8"
       copy: "\uebcc"
     callbacks:
       on_left: "toggle_menu"
       on_middle: "do_nothing"
       on_right: "toggle_label"
     label_shadow:
       enabled: false
       color: "black"
       radius: 3
       offset: [ 1, 1 ]
  komorebi_active_layout:
   type: "komorebi.active_layout.ActiveLayoutWidget"
   options:
     hide_if_offline: true
     label: "{icon}"
     layouts: ['bsp', 'columns', 'rows', 'grid', 'vertical_stack', 'horizontal_stack','right_main_vertical_stack']
     layout_icons:
       bsp: "\uebeb"
       columns: "\uebf7"
       rows: "\uec01"
       grid: "\udb81\udf58"
       vertical_stack: "\uebee"
       horizontal_stack: "\uebf0"
       right_main_vertical_stack: "\uebf1"
       monocle: "\udb80\ude08"
       maximised: "\uf06f"
       floating: "\uf2d2"
       paused: "\udb83\udf89"
       tiling: "\udb81\ude40"
     callbacks:
       on_left: 'toggle_layout_menu'
       on_middle: 'next_layout'
       on_right: 'prev_layout'
     layout_menu:
       blur: true
       round_corners: true
       round_corners_type: "normal"
       border_color: "System"
       alignment: "left"
       direction: "down"
       offset_top: 10
       offset_left: 1
       show_layout_icons: true
     container_padding: 
       top: 0
       left: 12
       bottom: 0
       right: 12
     label_shadow:
       enabled: false
       color: "black"
       radius: 3
       offset: [ 1, 1 ]
  pomodoro:
   type: "yasb.pomodoro.PomodoroWidget"
   options:
     label: "<span>{icon}</span> {remaining}"
     label_alt: "<span>{icon}</span> Session {session}/{total_sessions} - {status}"
     work_duration: 25
     break_duration: 5
     long_break_duration: 15
     long_break_interval: 4
     auto_start_breaks: true
     auto_start_work: true
     sound_notification: true
     show_notification: true
     hide_on_break: false
     session_target: 8
     icons:
       work: "\uf252"
       break: "\uf253"
       paused: "\uf254"
     container_padding:
       top: 0
       left: 12
       bottom: 0
       right: 12
     menu:
       blur: true
       round_corners: true
       round_corners_type: "normal"
       border_color: "System"
       alignment: "right"
       direction: "down"
       offset_top: 10
       offset_left: 0
       circle_background_color: "#33ffffff"
       circle_work_progress_color: "#88c0d0"
       circle_break_progress_color: "#a3be8c"
       circle_thickness: 8
       circle_size: 160
     callbacks:
       on_left: "toggle_menu"
       on_middle: "reset_timer"
       on_right: "toggle_label"
     label_shadow:
       enabled: false
       color: "black"
       radius: 2
       offset: [ 1, 1 ]
  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "{device_name}"
      label_no_device: " No connected devices "
      label_device_separator: ", "
      max_length: 40
      max_length_ellipsis: "..."
      icons: 
        bluetooth_on: "\udb80\udcaf"
        bluetooth_off: "\udb80\udcb2"
        bluetooth_connected: "\udb80\udcb1"
      device_aliases:
        - name: "T5.0"
          alias: "\uf025"
      callbacks:
        on_left: "toggle_label"
        on_right: "exec cmd.exe /c start ms-settings:bluetooth"
      label_shadow:
        enabled: false
        color: "black"
        radius: 2
        offset: [ 1, 1 ]
  brightness:
    type: "yasb.brightness.BrightnessWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "Brightness {percent}%"
      tooltip: true
      hide_unsupported: true
      brightness_toggle_level: [0, 45, 75, 100]
      auto_light: false
      auto_light_icon: "\udb80\udce1"
      auto_light_night_level: 35
      auto_light_night_start_time: "19:00"
      auto_light_night_end_time: "06:45"
      auto_light_day_level: 75
      brightness_icons: [
        "\udb80\udcde",  # Icon for 0-25% brightness
        "\udb80\udcdd",  # Icon for 26-50% brightness
        "\udb80\udcdf",  # Icon for 51-75% brightness
        "\udb80\udce0"   # Icon for 76-100% brightness
      ]
      brightness_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
      callbacks:
          on_left: "toggle_label"
          on_right: "toggle_level_next"
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
      label_shadow:
        enabled: true
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  wifi:
      type: "yasb.wifi.WifiWidget"
      options:
        label: "<span>{wifi_icon}</span>"
        label_alt: "Wi-Fi: {wifi_name} {wifi_strength}%"
        update_interval: 5000
        callbacks:
          on_left: "exec cmd.exe /c start ms-settings:network"
          on_middle: "do_nothing"
          on_right: "toggle_label"
        container_padding:
          top: 0
          left: 8
          bottom: 0
          right: 8
        wifi_icons: [
          "\udb82\udd2e",  # Icon for 0% strength
          "\udb82\udd1f",  # Icon for 1-20% strength
          "\udb82\udd22",  # Icon for 21-40% strength
          "\udb82\udd25",  # Icon for 41-80% strength
          "\udb82\udd28"   # Icon for 81-100% strength
        ]
  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "\udb81\udeb6"
      label_expanded: "\udb82\ude03"
      label_position: "left" # Can be "left" or "right"
      icon_size: 15 # Can be any integer between 8 and 64
      pin_click_modifier: "alt" # Can be "ctrl", "alt" or "shift"
      show_unpinned: false
      # show_unpinned_button: true
      # show_network: true 
  language:
    type: "yasb.language.LanguageWidget"
    options:
      label: "<span>\uf11c</span>{lang[country_code]}"
      update_interval: 5
      callbacks:
        on_left: "do_nothing"
        on_middle: "do_nothing"
        on_right: "do_nothing"
      container_padding:
        top: 0
        left: 0
        bottom: 0
        right: 8
  whkd:
    type: "yasb.whkd.WhkdWidget"
    options:
      label: "<span>\uf11c</span>"
      special_keys:
        - key: "lwin"
          key_replace: "\ue70f"
        - key: "left"
          key_replace: "\u2190"
        - key: "right"
          key_replace: "\u2192"
        - key: "up"
          key_replace: "\u2191"
        - key: "down"
          key_replace: "\u2193"
      container_padding:
        top: 0
        left: 0
        bottom: 0
        right: 4
  disk:
    type: "yasb.disk.DiskWidget"
    options:
        label: "<span>\uf473</span>"
        label_alt: "<span>\uf473</span>"
        update_interval: 60
        group_label:
          volume_labels: ["C", "D"]
          show_label_name: true
          blur: True
          round_corners: True
          round_corners_type: "small"
          border_color: "System"
          alignment: "left"
          direction: "down"
          distance: 6
        callbacks:
          on_left: "toggle_group"
          on_middle: "toggle_label"
          on_right: "exec explorer C:\\" # Open disk C in file explorer
  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 12
      min_bar_height: 0
      gradient: 1
      reverse: 0
      foreground: "#89b4fa"
      gradient_color_1: '#999999'  # medium grey
      gradient_color_2: '#bbbbbb'  # lighter grey
      gradient_color_3: '#dddddd'  # very light grey
      bars_number: 8
      bar_spacing: 2
      bar_width: 5
      sleep_timer: 2
      hide_empty: true
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
  active_window:
    type: "yasb.active_window.ActiveWindowWidget"
    options:
      label: "{win[title]}"
      label_alt: "{win[process][name]}"
      label_no_window: " \ue8e5"
      label_icon: true
      label_icon_size: 14
      max_length: 16
      max_length_ellipsis: "..."
      monitor_exclusive: false 
  cpu:
      type: "yasb.cpu.CpuWidget"
      options:
        label: "<span>\uf4bc</span> {info[percent][total]}%"
        label_alt: "<span>\uf437</span> {info[histograms][cpu_percent]}"
        update_interval: 2000
        cpu_thresholds:
          low: 25
          medium: 50
          high: 90
        histogram_icons:
          - "\u2581" # 0%
          - "\u2581" # 10%
          - "\u2582" # 20%
          - "\u2583" # 30%
          - "\u2584" # 40%
          - "\u2585" # 50%
          - "\u2586" # 60%
          - "\u2587" # 70%
          - "\u2588" # 80%+
        histogram_num_columns: 8
        callbacks:
          on_right: "exec cmd /c Taskmgr"
        label_shadow:
          enabled: false
          color: "black"
          radius: 3
          offset: [ 1, 1 ]
        container_padding:
          top: 0
          left: 6
          bottom: 0
          right: 6
  memory:
      type: "yasb.memory.MemoryWidget"
      options:
        label: "<span>\uefc5</span> {virtual_mem_free}/32G "
        label_alt: "<span>\uf4bc</span> RAM: {virtual_mem_percent}% SWAP: {swap_mem_percent}% "
        update_interval: 5000
        callbacks:
          on_left: "do_nothing"
          on_middle: "do_nothing"
          on_right: "do_nothing"
        memory_thresholds:
          low: 25
          medium: 50
          high: 90
        histogram_icons:
          - "\u2581" # 0%
          - "\u2581" # 10%
          - "\u2582" # 20%
          - "\u2583" # 30%
          - "\u2584" # 40%
          - "\u2585" # 50%
          - "\u2586" # 60%
          - "\u2587" # 70%
          - "\u2588" # 80%+
        label_shadow:
          enabled: false
          color: "black"
          radius: 3
          offset: [ 1, 1 ]
  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>\uf476</span> {count}"
      label_alt: "{count} powiadomień"
      hide_empty: true
      tooltip: true
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "toggle_label"
      container_padding:
        top: 0
        left: 12
        bottom: 0
        right: 12
  microphone:
      type: "yasb.microphone.MicrophoneWidget"
      options:
        label: "<span>{icon}</span>"
        label_alt: "<span>{icon}</span> Poziom: {level}"
        mute_text: "wyciszone"
        icons:
          normal: "\uf130"
          muted: "\uf131"
        mic_menu:
          blur: true
          round_corners: true
          round_corners_type: "normal"
          border_color: "system"
          alignment: "center"
          direction: "down"
          offset_top: 10
        callbacks:
          on_left: "toggle_mic_menu"
          on_middle: "toggle_label"
          on_right: "toggle_mute"
        label_shadow:
          enabled: false
          color: "black"
          radius: 3
          offset: [ 1, 1 ]
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "<span>◝(ᵔᗜᵔ)◜</span>"
      menu_list:
      - { title: "Użytkownik", path: "~" }
      - { title: "Pobrane", path: "D:\\Users\\Bartosz\\Downloads" }
      - { title: "Dokumenty", path: "D:\\Users\\Bartosz\\Documents" }
      - { title: "Obrazy", path: "C:\\Users\\Bartosz\\OneDrive\\PC\\Obrazy" }
      system_menu: true
      power_menu: true
      blur: true
      round_corners: true
      round_corners_type: "normal"
      border_color: "System"
      offset_top: 10
      offset_left: 10
      container_padding: 
        top: 0
        left: 0
        bottom: 0
        right: 0
      alignment: "left"
      direction: "down"
      menu_labels:
       shutdown: "Zamknij"
       restart: "Uruchom ponownie"
       logout: "Wyloguj"
       lock: "Zablokuj"
       sleep: "Uśpij"
       system: "Ustawienia"
       about: "O systemie"
       task_manager: "Menedżer zadań"
      label_shadow:
       enabled: false
       color: "black"
       radius: 2
       offset: [ 1, 1 ]
  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title} - {artist}"
      label_alt: "{title}"
      hide_empty: true
      callbacks:
        on_left: "toggle_media_menu"
        on_middle: "toggle_label"
        on_right: "toggle_media_menu"
      max_field_size:
        label: 40
        label_alt: 40
      show_thumbnail: true
      controls_only: false
      controls_left: true
      controls_hide: false
      thumbnail_alpha: 90
      thumbnail_padding: 100
      thumbnail_corner_radius: 50
      thumbnail_edge_fade: true
      container_padding: {'top': 3, 'left': 12, 'bottom': 3, 'right': 0}
      scrolling_label:
        enabled: true
        update_interval_ms: 60
        style: "bounce-ease"  # can be "left", "right", "bounce", "bounce-ease"
        separator: " | "
        label_padding: 1
        # Easing curve params: https://www.desmos.com/calculator/j7eamemxzi
        ease_slope: 20
        ease_pos: 0.8
        ease_min: 0.5
      icons:
        prev_track: "\uf048"
        next_track: "\uf051"
        play: "\uf04b"
        pause: "\uf04c"
      media_menu:
        blur: false
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 10
        offset_left: 180
        thumbnail_corner_radius: 16
        thumbnail_size: 120
        max_title_size: 80
        max_artist_size: 20
        show_source: true
      media_menu_icons:
        play: "\ue768"
        pause: "\ue769"
        prev_track: "\ue892"
        next_track: "\ue893"
      label_shadow:
        enabled: true
        color: "#464646"
        radius: 1
        offset: [ 1, 1 ]
  clock:
      type: "yasb.clock.ClockWidget"
      options:
        label: "<span>{icon}</span> {%H:%M:%S}"
        label_alt: "\uf017 {%d-%m-%y %H:%M:%S}"
        locale: "PL"
        update_interval: 1000
        timezones: []
        icons:
          clock_00 : "<span>\udb81\udcb2</span>"
          clock_01 : "\udb85\udc3f"
          clock_02 : "\udb85\udc40"
          clock_03 : "\udb85\udc41"
          clock_04 : "\udb85\udc42"
          clock_05 : "\udb85\udc43"
          clock_06 : "\udb85\udc44"
          clock_07 : "\udb85\udc45"
          clock_08 : "\udb85\udc46"
          clock_09 : "\udb85\udc47"
          clock_10 : "\udb85\udc48"
          clock_11 : "\udb85\udc49"
          clock_12 : "\udb85\udc4a"
          clock_16 : "\udb80\ude5a"
          clock_21 : "<span>\udb81\udcb2</span>"
          clock_22 : "<span>\udb81\udcb2</span>"
          clock_23 : "<span>\udb81\udcb2</span>"
        calendar: 
          blur: True
          round_corners: True
          round_corners_type: "normal"
          border_color: "System"
          alignment: "right"
          direction: "down"
          show_holidays: True
          show_week_numbers: True
          country_code: "PL"
          holiday_color: "#FF6464"
          offset_top: 10
        callbacks:
          on_left: "toggle_calendar"
          on_middle: "toggle_label"
          on_right: "toggle_label"
        label_shadow:
          enabled: false
          color: "black"
          radius: 3
          offset: [ 1, 1 ]
        container_padding:
          top: 0
          left: 4
          bottom: 0
          right: 8
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "\u23fc Brak połączenia"
      label_workspace_btn: "\uf444"
      label_workspace_active_btn: "\uf192"
      label_workspace_populated_btn: "\uf444"
      label_default_name: "{index}"
      label_zero_index: false
      hide_empty_workspaces: false
      hide_if_offline: true
      animation: true
      offset_top: 10
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
  weather:
    type: "core.widgets.yasb.weather_localized.WeatherLocalizedWidget"
    options:
      locale: "en"
      label: "<span>{icon}</span> {temp}, {feelslike}"
      label_alt: "\udb84\udcc3 {min_temp}, \udb84\udcc2 {max_temp}"
      api_key: "1ef9d313a55c4164b76133933252005"
      show_alerts: true
      update_interval: 600
      hide_decimal: true
      units: "metric"
      location: "Poland, Krakow"
      locale: "en"
      callbacks:
        on_left: "toggle_card"
        on_right: "toggle_label"
      icons:
        sunnyDay: "\ue30d"
        clearNight: "\ue32b"
        cloudyDay: "\ue312"
        cloudyNight: "\ue311"
        rainyDay: "\ue308"
        rainyNight: "\ue333"
        snowyDay: "\ue30a"
        snowyNight: "\ue335"
        blizzardDay: "\udb83\udf36"
        blizzardNight: "\udb83\udf36"
        foggyDay: "\ue303"
        foggyNight: "\ue346"
        thunderstormDay: "\ue30f"
        thunderstormNight: "\ue338"
        default: "\uebaa"
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
      weather_card:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        icon_size: 64
        show_hourly_forecast: true # Set to False to disable hourly forecast
        time_format: "24h" # can be 12h or 24h
        hourly_point_spacing: 76
        hourly_icon_size: 32 # better to set 16, 32 or 64 for better quality
        icon_smoothing: true # should be true for smoother icon or false for sharper icon if using 16, 32 or 64 for hourly_icon_size
        temp_line_width: 2 # can be 0 to hide the temperature line
        current_line_color: "#8EAEE8"
        current_line_width: 1 # can be 0 to hide the current hour line
        current_line_style: "dot"
        hourly_gradient:
            enabled: true
            top_color: "#8EAEE8"
            bottom_color: "#2A3E68"
        hourly_forecast_buttons: # Optional hourly forecast data type toggle buttons, default disabled
            enabled: true # Set to false to hide the buttons
            default_view: "temperature" # Default view when opening the weather card. Options: "temperature", "rain", "snow"
            temperature_icon: "\udb81\udd99"
            rain_icon: "\udb81\udd96"
            snow_icon: "\udb81\udd98"
        weather_animation:
            enabled: true
            snow_overrides_rain: true
            temp_line_animation_style: both # can be "rain", "snow", "both", or "none"
            rain_effect_intensity: 1.0 # 0.01 - 10.0
            snow_effect_intensity: 1.0 # 0.01 - 10.0
            scale_with_chance: true
            enable_debug: false
      label_shadow:
        enabled: false
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      tooltip: false
      volume_icons:
        - "\ueee8"
        - "\uf026"
        - "\uf027"
        - "\uf027"
        - "\uf028"
      callbacks:
        on_left: "toggle_volume_menu"
        on_right: "toggle_mute"
      audio_menu:
        blur: True
        round_corners: True
        round_corners_type: "small"
        border_color: "System"
        alignment: "right"
        direction: "down"
        distance: 6
        offset_top: 10
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "\uf011"
      uptime: True
      blur: False
      blur_background: True
      animation_duration: 200
      button_row: 5
      buttons:
        shutdown: ["\uf011", "Wyłącz"]
        restart: ["\uead2", "Uruchom ponownie"]
        signout: ["\udb80\udf43", "Wyloguj"]
        hibernate: ["\uf28e", "Hibernuj"]
        sleep: ["\u23fe", "Uśpij"]
        cancel: ["", "Anuluj"]
      container_padding:
        top: 0
        left: 8
        bottom: 0
        right: 8
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      animation:
       enabled: true
       duration: 200
       type: "fadeInOut"
      icon_size: 16
      ignore_apps:
        processes: []
        titles: []
        classes: []
      container_padding:
        top: 2
        left: 0
        bottom: 2
        right: 0
      title_label:
        enabled: false
        show: "focused"
        min_length: 10
        max_length: 10   
  todo:
      type: "yasb.todo.TodoWidget"
      options:
        label: "\uf0ae {count}/{completed}"
        label_alt: "\uf0ae Zadania: {count}"
        menu:
          blur: true
          round_corners: true
          round_corners_type: "normal"
          border_color: "system"
          alignment: "left"
          direction: "down"
          offset_top: 10
          offset_left: 0
        icons:
          add: "\uf501 Nowe zadanie"
          edit: "Edytuj"
          delete: "Usuń"
          date: "\ue641"
          category: "\uf412"
          checked: "\udb80\udd34"
          unchecked: "\udb80\udd30"
          sort: "\ueab4"
          no_tasks: "\uf4a0"
        categories:
          default:
            label: "Zwykłe"
          soon:
            label: "Do wkrótce"
          today:
            label: "Do końca dnia"
          urgent:
            label: "Pilne"
          important:
            label: "Ważne"
        callbacks:
          on_left: "toggle_menu"
          on_middle: "do_nothing"
          on_right: "toggle_label"
  launchpad:
      type: "yasb.launchpad.LaunchpadWidget"
      options:
        label: "<span>\udb85\udcde</span>"
        search_placeholder: "Wpisz tutaj, aby wyszukać"
        app_icon_size: 48
        window:
          fullscreen: false
          width: 800
          height: 600
          overlay_block: true
        window_style:
          enable_blur: true
          round_corners: true
          round_corners_type: "normal"
          border_color: "system"
        window_animation:
          fade_in_duration: 200
          fade_out_duration: 200
        callbacks:
          on_left: "toggle_launchpad"
        app_title_shadow:
          enabled: true
          color: "#00000090"
          offset: [1, 1]
          radius: 2
        app_icon_shadow:
          enabled: true
          color: "#00000090"
          offset: [0, 2]
          radius: 8
  ai_chat:
      type: "yasb.ai_chat.AiChatWidget"
      options:
        label: "<span>\uf086</span>"
        chat:
          blur: true
          round_corners: true
          round_corners_type: "normal"
          border_color: "system"
          alignment: "right"
          direction: "down"
          offset_left: -5
          offset_top: 10
        icons:
          send: "\uf1d8"
          stop: "\uf04d"
          clear: "\uf1f8"
          assistant: "\udb81\ude74"
        notification_dot:
          enabled: true
          corner: "top_right"
          color: "red"
          margin: [ 0, 2 ]
        callbacks:
          on_left: "toggle_chat"
        providers:
          - provider: "Ollama"
            api_endpoint: "http://localhost:11434/v1"
            credential: "ollama"
            models: 
            - name: "gemma3:4b"
              label: "Gemma 3:4B"
            - name: "gpt-oss:20b"
              label: "Shadow Work"
              instructions: "C:/Users/Bartosz/custom_gpt_chatmode.md"
          - provider: "OpenAI"
            api_endpoint: "https://api.openai.com/v1"
            credential: "dsfsfsfs65sd6f56sd5f6"
            models:
            - name: "gpt-4"
              label: "GPT4"
              temperature: 0.3
              top_p: 0.95
              max_tokens: 4096
            - name: "gpt-3.5-turbo"
              label: "GPT3.5 Turbo"
